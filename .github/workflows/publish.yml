name: Publish to npm

on:
  push:
    tags:
      - "*.*.*"   # only semver tags like v1.2.3

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # important for branch checks

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Verify tag is SemVer
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          echo "Checking tag: $TAG"

          if ! echo "$TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag is not valid SemVer (expected vX.Y.Z)"
            exit 1
          fi
        
      - name: Verify package.json tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF#refs/tags/v}

          if [ "$VERSION" != "$TAG" ]; then
            echo "package.json version ($VERSION) != tag ($TAG)"
            exit 1
          fi

      - name: Verify tag is on master branch
        run: |
          git fetch origin master

          TAG_COMMIT=$(git rev-list -n 1 $GITHUB_REF)
          MASTER_COMMIT=$(git rev-parse origin/master)

          echo "Tag commit: $TAG_COMMIT"
          echo "Master commit: $MASTER_COMMIT"

          if [ "$TAG_COMMIT" != "$MASTER_COMMIT" ]; then
            echo "Tag is not on master branch tip"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish